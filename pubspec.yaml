name: travel_planner_app
description: "Travel Planner - A premium AI-powered travel planning app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.6.1
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Typography
  google_fonts: ^6.2.1
  # Charts
  fl_chart: ^0.70.2
  # Animations
  flutter_animate: ^4.5.2
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  shimmer: ^3.0.0
  share_plus: ^10.1.4
  smooth_page_indicator: ^1.2.0+3
  lucide_icons_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: 2.4.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
